version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html
    networks:
      - laravel

  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: laravel_db
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - laravel

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    volumes:
      - ./src:/app
    ports:
      - "5174:5174"
    networks:
      - laravel

  nginx:
    image: nginx:1.26
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/html
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - laravel

volumes:
  db_data:

networks:
  laravel:
